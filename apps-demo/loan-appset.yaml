apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: loan

spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
  - matrix:
      generators:
      - git:
          repoURL: https://github.com/aperture-sci/DevOps.git
          revision: HEAD
          directories:
            - path: manifests/loan/*
      - clusters:
          selector:
            matchExpressions:
              - key: shortname
                operator: Exists
            # matchLabels:
            #   type: "non-prod"
  template:
    metadata:
      name: '{{.path.basename}}-{{.metadata.labels.shortname}}'
      finalizers:
        - resources-finalizer.argocd.argoproj.io/foreground
      annotations:
        notifications.argoproj.io/subscribe.on-sync-succeeded.grafana: loan
        argocd.argoproj.io/manifest-generate-paths: '.'
        codefresh.io/product: '{{.path.basename}}'
        codefresh.io/app-group: loan
        argo.octopus.com/project: '{{.path.basename}}'
        argo.octopus.com/environment: "{{metadata.labels.shortname}}"
        argo.octopus.com/tenant: "{{metadata.labels.tenant}}"

      labels:
        codefresh.io/product: '{{.path.basename}}'
        application: loan
    spec:
      project: default
      source:
        repoURL: https://github.com/aperture-sci/DevOps.git
        targetRevision: main
        path: '{{.path.path}}/{{metadata.labels.shortname}}'
      destination:
        name: '{{.cluster}}'
        namespace: '{{metadata.labels.shortname}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - PrunePropagationPolicy=foreground
          - Replace=false
          - PruneLast=false
          - Validate=true
          - CreateNamespace=true
          - ApplyOutOfSyncOnly=false
